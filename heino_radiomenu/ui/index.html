<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radiomenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="radio-menu" class="hidden">
      <div class="radio-container">
        <div class="radio-header">
          <h2 id="menu-title"></h2>
          <span class="header-sub" id="menu-sub"></span>
          <button id="close-btn" class="close-btn" aria-label="Close menu">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="radio-stations">
          <div class="station" data-animation="default">
            <div class="station-img-wrap">
              <img src="img/normal.png" alt="Normal" />
              <div class="station-overlay">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>
            <div class="station-footer">
              <span class="station-name">Normal</span>
            </div>
          </div>
          <div class="station" data-animation="closeup">
            <div class="station-img-wrap">
              <img src="img/close.png" alt="Close" />
              <div class="station-overlay">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>
            <div class="station-footer">
              <span class="station-name">Munden</span>
            </div>
          </div>
          <div class="station" data-animation="leanover">
            <div class="station-img-wrap">
              <img src="img/lean.png" alt="Lean" />
              <div class="station-overlay">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>
            <div class="station-footer">
              <span class="station-name">Lean</span>
            </div>
          </div>
          <div class="station" data-animation="crossed_arms">
            <div class="station-img-wrap">
              <img src="img/crossed.png" alt="Krydset arme" />
              <div class="station-overlay">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>
            <div class="station-footer">
              <span class="station-name">Krydset arme</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
